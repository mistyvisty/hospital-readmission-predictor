name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: pip install fastapi==0.109.0 uvicorn==0.27.0 pydantic==2.5.3 xgboost==2.0.3 scikit-learn==1.3.2 pandas==2.1.4 numpy==1.26.2 joblib==1.3.2 pytest httpx==0.26.0 starlette==0.35.0 httpx2

    - name: Generate synthetic data
      run: python -c "import pandas as pd; import numpy as np; n=5000; df=pd.DataFrame({'time_in_hospital':np.random.randint(1,14,n),'num_lab_procedures':np.random.randint(1,100,n),'num_procedures':np.random.randint(0,6,n),'num_medications':np.random.randint(1,30,n),'number_outpatient':np.random.randint(0,5,n),'number_emergency':np.random.randint(0,5,n),'number_inpatient':np.random.randint(0,5,n),'number_diagnoses':np.random.randint(1,9,n),'readmitted':np.random.choice(['<30','>30','NO'],n)}); import os; os.makedirs('data',exist_ok=True); df.to_csv('data/diabetic_data.csv',index=False)"

    - name: Train model
      run: python notebooks/train_model.py

    - name: Run tests
      run: pytest tests/ -v