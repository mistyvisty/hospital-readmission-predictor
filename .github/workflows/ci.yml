name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: pip install -r requirements.txt && pip install pytest httpx httpx2

    - name: Download dataset
      run: |
        mkdir -p data
        pip install kaggle
        echo 'Dataset download skipped - using synthetic data for CI'
        python -c "
import pandas as pd
import numpy as np
n = 5000
df = pd.DataFrame({
    'time_in_hospital': np.random.randint(1,14,n),
    'num_lab_procedures': np.random.randint(1,100,n),
    'num_procedures': np.random.randint(0,6,n),
    'num_medications': np.random.randint(1,30,n),
    'number_outpatient': np.random.randint(0,5,n),
    'number_emergency': np.random.randint(0,5,n),
    'number_inpatient': np.random.randint(0,5,n),
    'number_diagnoses': np.random.randint(1,9,n),
    'readmitted': np.random.choice(['<30','>30','NO'],n)
})
df.to_csv('data/diabetic_data.csv', index=False)
print('Synthetic data created')
"

    - name: Train model
      run: python notebooks/train_model.py

    - name: Run tests
      run: pytest tests/ -v
